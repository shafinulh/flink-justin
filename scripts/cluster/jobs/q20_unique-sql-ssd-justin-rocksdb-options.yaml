apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink
spec:
  image: 142.150.234.165:5000/flink-justin-sql:dais
  imagePullPolicy: Always
  flinkVersion: v1_18
  flinkConfiguration:
    job.autoscaler.enabled: 'true'
    job.autoscaler.justin.enabled: 'true'
    job.autoscaler.memory.max-level: '4'
    job.autoscaler.stabilization.interval: 13m
    job.autoscaler.cache-hit-rate.min.threshold: '0.8'
    job.autoscaler.state-latency.threshold: '1000000.0'
    job.autoscaler.metrics.window: 2m
    pipeline.max-parallelism: '24'
    taskmanager.numberOfTaskSlots: '4'
    execution.checkpointing.interval: 300m
    state.checkpoints.dir: file:///mnt/experiments/autoscaling-experiments/flink-state/checkpoints
    execution.checkpointing.savepoint-dir: file:///mnt/experiments/autoscaling-experiments/flink-state/savepoints
    execution.checkpointing.incremental: 'true'
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
    state.backend.local-recovery: 'true'
    state.backend.rocksdb.memory.managed: 'false'
    state.backend.rocksdb.options-factory: com.example.CustomRocksDBOptionsFactoryKubernetesJustin
    jobmanager.scheduler: adaptive
    job.autoscaler.target.utilization: '0.5'
    job.autoscaler.target.utilization.boundary: '0.3'
    metrics.reporters: prom
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    web.submit.enable: 'true'
    web.cancel.enable: 'true'
    state.backend: rocksdb
    taskmanager.memory.managed.fraction: '0.4'
    taskmanager.cpu.cores: '4'
    state.backend.rocksdb.metrics.block-cache-capacity: 'true'
    state.backend.rocksdb.metrics.block-cache-usage: 'true'
    state.backend.rocksdb.metrics.block-cache-hit: 'true'
    state.backend.rocksdb.metrics.block-cache-miss: 'true'
    state.backend.rocksdb.metrics.block-cache-pinned-usage: 'true'
    state.backend.rocksdb.metrics.bytes-read: 'true'
    state.backend.rocksdb.metrics.bytes-written: 'true'
    state.backend.rocksdb.metrics.column-family-as-variable: 'true'
    state.backend.rocksdb.metrics.compaction-pending: 'true'
    state.backend.rocksdb.metrics.compaction-read-bytes: 'true'
    state.backend.rocksdb.metrics.compaction-write-bytes: 'true'
    state.backend.rocksdb.metrics.cur-size-active-mem-table: 'true'
    state.backend.rocksdb.metrics.cur-size-all-mem-tables: 'true'
    state.backend.rocksdb.metrics.estimate-live-data-size: 'true'
    state.backend.rocksdb.metrics.estimate-num-keys: 'true'
    state.backend.rocksdb.metrics.estimate-pending-compaction-bytes: 'true'
    state.backend.rocksdb.metrics.estimate-table-readers-mem: 'true'
    state.backend.rocksdb.metrics.iter-bytes-read: 'true'
    state.backend.rocksdb.metrics.live-sst-files-size: 'true'
    state.backend.rocksdb.metrics.num-files-at-level0: 'true'
    state.backend.rocksdb.metrics.num-files-at-level1: 'true'
    state.backend.rocksdb.metrics.num-files-at-level2: 'true'
    state.backend.rocksdb.metrics.num-immutable-mem-table: 'true'
    state.backend.rocksdb.metrics.num-live-versions: 'true'
    state.backend.rocksdb.metrics.size-all-mem-tables: 'true'
    state.backend.rocksdb.metrics.total-sst-files-size: 'true'
    state.backend.latency-track.keyed-state-enabled: 'true'
    state.backend.rocksdb.use-direct-writes: 'true'
    state.backend.rocksdb.use-direct-reads: 'true'
    state.backend.rocksdb.localdir: /data/flink/rocksdb
  serviceAccount: flink
  podTemplate:
    apiVersion: v1
    kind: Pod
    metadata:
      name: pod-template
    spec:
      containers:
      - name: flink-main-container
        ports:
        - containerPort: 9249
          name: prom
        volumeMounts:
        - name: checkpoint-storage
          mountPath: /mnt/experiments/autoscaling-experiments/flink-state
      volumes:
      - name: checkpoint-storage
        hostPath:
          path: /mnt/experiments/autoscaling-experiments/flink-state
          type: DirectoryOrCreate
  jobManager:
    resource:
      memory: 2048m
      cpu: 1
    podTemplate:
      apiVersion: v1
      kind: Pod
      metadata:
        name: job-manager-pod-template
      spec:
        nodeSelector:
          tier: jobmanager
  taskManager:
    resource:
      memory: 2048m
      cpu: 4
    podTemplate:
      apiVersion: v1
      kind: Pod
      metadata:
        name: task-manager-pod-template
      spec:
        nodeSelector:
          tier: taskmanager
        containers:
        - name: flink-main-container
          volumeMounts:
          - name: checkpoint-storage
            mountPath: /mnt/experiments/autoscaling-experiments/flink-state
          - name: rocksdb-ssd
            mountPath: /data/flink/rocksdb
        volumes:
        - name: checkpoint-storage
          hostPath:
            path: /mnt/experiments/autoscaling-experiments/flink-state
            type: DirectoryOrCreate
        - name: rocksdb-ssd
          hostPath:
            path: /data/flink/rocksdb
            type: DirectoryOrCreate
  job:
    jarURI: local:///opt/flink/lib/nexmark-flink-0.3-SNAPSHOT.jar
    entryClass: com.github.nexmark.flink.sql.SqlQueryJob
    parallelism: 1
    upgradeMode: stateless
    args:
    - --query
    - q20_unique
    - --tps
    - '100000'
    - --events
    - '125000000'
    - --max-emit-speed
    - 'false'
    - --prob-delayed-event
    - '0'
    - --occasional-delay-min-sec
    - '60'
    - --occasional-delay-sec
    - '240'
    - --out-of-order-group-size
    - '1000000'
    - --job-name
    - q20_unique-sql-ssd-justin-rocksdb-options
